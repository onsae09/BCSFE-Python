# 전체 문서: https://codeberg.org/fieryhenry/ExampleEditorLocale#format-of-the-properties-files
# 색상 포맷
#
# <@p> = 기본 색상
# <@s> = 보조 색상
# <@t> = 3차 색상
# <@q> = 4차 색상
# <@e> = 오류 색상
# <@w> = 경고 색상
# <@su> = 성공 색상
#
# </> = 현재 색상 닫기
# 색상을 지정할 때는 실제 색상 코드/이름 대신 위 포맷 태그를 사용하세요. 그래야 테마마다 다른 색상을 사용할 수 있습니다.
# 정확한 색상이 중요한 경우에만 실제 색상 코드/이름을 사용하세요. 예를 들어 빨간 타겟 본능옥을 빨간색으로 칠할 때처럼요.
# 텍스트에 < 또는 > 또는 / 를 쓰고 싶다면 백슬래시(\)로 이스케이프하세요. 예: \< 또는 \> 또는 \/
#
# <#rrggbb> = 16진 색상
#
# <w> = 흰색
# <bl> = 검은색
# <r> = 빨간색
# <g> = 초록색
# <b> = 파란색
# <y> = 노란색
# <m> = 마젠타
# <c> = 시안
# <dy> = 어두운 노란색
# <dg> = 어두운 회색
# <db> = 어두운 파란색
# <dc> = 어두운 시안
# <dm> = 어두운 마젠타
# <dr> = 어두운 빨간색
# <dgn> = 어두운 초록색
# <lg> = 밝은 회색
# <o> = 주황색

downloading=<@su><@s>{file_name}</> 파일을 <@s>{pack_name}</>에서 다운로드하는 중 (버전 <@s>{version}</>, 국가 코드 <@s>{country_code}</>)
failed_to_download_game_data=<@e>게임 데이터 <@s>{file_name}</> 파일을 <@s>{pack_name}</>에서 다운로드하지 못했습니다 (버전 <@s>{version}</>, 국가 코드 <@s>{country_code}</>). URL: <@s>{url}</s> 인터넷 연결을 확인해 보세요.</>
failed_to_get_game_versions=<@e>게임 버전을 가져오지 못했습니다. 인터넷 연결을 확인해 보세요.</>
no_device_error=<@e>연결된 기기를 찾을 수 없습니다</>
no_package_name_error=<@e>냥코대전쟁 패키지를 찾을 수 없습니다. 기기가 루팅되지 않았거나, 캣 베이스를 한 번 이상 실행한 뒤 다시 시도해야 할 수 있습니다.</>
exit=종료
tkinter_not_found=<@e>tkinter를 찾을 수 없습니다. 모바일 환경이 아니라면 설치 후 다시 시도하세요.</>
tkinter_not_found_enter_path_file={initialfile} 파일의 경로/위치를 입력하세요:
tkinter_not_found_enter_path_file_save={initialfile} 파일을 저장할 경로/위치를 입력하세요:
tkinter_not_found_enter_path_dir={initialdir} 폴더의 경로/위치를 대신 입력하세요:
discord_url=https://discord.gg/DvmMgvn5ZB

welcome=
><@t><@s>냥코대전쟁 세이브 파일 에디터</>에 오신 것을 환영합니다!
>제작: <@s>fieryhenry</>
>
>Codeberg: <@s>https://codeberg.org/fieryhenry/BCSFE-Python</>
>Discord: <@s>{{discord_url}}</> - 버그는 <@s>#bug-reports</>에, 제안은 <@s>#suggestions</>에 남겨 주세요
>후원: <@s>https://ko-fi.com/fieryhenry</>
>
>설정 파일 위치: <@s>{config_path}</>
>
>{theme_text}
>
>{locale_text}
>
><@q>감사의 말씀:
>- <@s>Lethal's editor</> - 세이브 데이터 패치와 cf/xp 편집 방식을 처음 파악하는 데 영감을 주고 도움을 주었습니다: <@s>https://www.reddit.com/r/BattleCatsCheats/comments/djehhn/editoren/</>
>- <@s>Beeven</> 및 <@s>csehydrogen</>의 코드 - 세이브 데이터 패치 방식을 이해하는 데 큰 도움이 되었습니다: https://github.com/beeven/battlecats 및 https://github.com/csehydrogen/BattleCatsHacker
>- 제 작업을 응원해 주신 모든 분들 - 이 프로젝트와 비슷한 작업을 계속할 동기를 주셨습니다: <@s>https://ko-fi.com/fieryhenry</>
>- 세이브 파일을 제공하고, 버그를 제보하고, 새 기능을 제안해 준 디스코드 커뮤니티 여러분: <@s>{{discord_url}}</></>
>
><@w>이 프로그램에 돈을 지불했다면 사기를 당한 것입니다. 이 프로그램은 무료 오픈소스입니다.</>
>
><@w>이 도구는 본인 책임하에 사용하세요. 세이브 파일 손상이나 밴에 대해 저는 책임지지 않습니다.
>물론 세이브 에디터가 이를 막기 위해 노력하지만, 세이브가 안전하다고 보장할 수는 없습니다.
>그래도 세이브가 손상되었다면 디스코드에 꼭 제보해 주세요.
>편집 전에 세이브 파일을 백업해 두는 것을 권장합니다.</>

